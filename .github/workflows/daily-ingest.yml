name: Daily product ingestion

# Vercel serverless functions time out long before ~2500 products finish
# ingesting (confirmed: /api/cron/ingest 504s in production). GitHub Actions
# has no such limit, so this runs the same scripts/ingest.ts pipeline here
# instead. Triggered daily at 06:00 IST, or manually via workflow_dispatch.
on:
  schedule:
    - cron: "30 0 * * *" # 06:00 IST = 00:30 UTC
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run ingest:once
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEMO_USER_ID: demo-user-0001
          INGEST_USER_AGENT: "TrendDeal/1.0 (+aashrith.ram@meesho.com)"
